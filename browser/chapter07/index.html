<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 07: Why Wheels Move</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 600px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  canvas { border: 1px solid #ccc; background: #fafafa; display: block; margin: 0 auto; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 07: Why Wheels Move</h1>
<p class="key">A wheel only moves when force, friction, and a constraint work together.</p>
<div id="controls"></div>
<canvas id="sim" width="600" height="220"></canvas>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const groundY = 180;

let force = 80, friction = 8;

// State — extracted so reset is easy
let wheel, target;
function initState() {
  wheel = new Body('wheel', 50, groundY - 20, { mass: 1, radius: 20, color: '#1976d2' });
  target = new Body('target', 520, groundY - 5, { mass: 1, radius: 5, color: '#4caf50' });
}
initState();

// Controls
const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Force', 0, 200, 1, force, v => { force = v; });
UI.slider(cp, 'Friction', 0, 20, 0.5, friction, v => { friction = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

// Strip plot
const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 600, height: 100, window: 400,
  colors: ['#1976d2', '#ff9800'], labels: ['speed (px/s)', 'force (N)'],
  title: 'Speed & Applied Force over time'
});

// Metrics
const met = UI.metrics(document.getElementById('metrics-wrap'), ['Speed', 'Position', 'Force']);

function draw() {
  if (!state.paused) {
    wheel.clearForces();
    wheel.addForce(new Vec(force, 0));
    wheel.addForce(wheel.vel.mul(-friction));
    // clamp to canvas
    if (wheel.pos.x > canvas.width + 20) wheel.pos.x = -20;
    wheel.step(0.016);
    plot.push(0, wheel.vel.x);
    plot.push(1, force - friction * wheel.vel.x);
    met.update([wheel.vel.x, wheel.pos.x, force]);
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#8d6e63';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  drawBody(ctx, wheel);
  drawBody(ctx, target);
  drawArrow(ctx,
    { x: wheel.pos.x - 28, y: wheel.pos.y },
    { x: wheel.pos.x + 28, y: wheel.pos.y },
    '#ff9800');
  ctx.fillStyle = '#333'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`F=${force}N  drag=${friction}`, 8, 16);

  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
