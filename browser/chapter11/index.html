<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 11: Why Electricity Can Push</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 640px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  canvas { border: 1px solid #ccc; background: #fafafa; display: block; margin: 0 auto; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 11: Why Electricity Can Push</h1>
<p class="key">A current in a magnetic field experiences a Lorentz force — F = I·L×B.</p>
<div id="controls"></div>
<canvas id="sim" width="600" height="240"></canvas>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const fieldLineY = 130;

let liftForce = 120;
let currentOn = true;
let wire;

function initState() {
  wire = new Body('wire', 300, 200, { mass: 0.2, radius: 8, color: '#ff9800' });
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Force (current)', 0, 300, 5, liftForce, v => { liftForce = v; });
UI.button(cp, 'Toggle Current', () => { currentOn = !currentOn; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 600, height: 100, window: 300,
  colors: ['#ff9800', '#4caf50'], labels: ['height', 'velocity'],
  title: 'Wire height & velocity'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Height', 'Velocity', 'Current']);

function draw() {
  if (!state.paused) {
    wire.clearForces();
    wire.addForce(new Vec(0, 60));   // gravity-like downward
    if (currentOn) wire.addForce(new Vec(0, -liftForce));
    wire.step(0.016);
    // floor
    if (wire.pos.y > canvas.height - 20) { wire.pos.y = canvas.height - 20; wire.vel.y = 0; }
    // ceiling
    if (wire.pos.y < 50) { wire.pos.y = 50; wire.vel.y = 0; }
    const h = canvas.height - wire.pos.y;
    plot.push(0, h);
    plot.push(1, wire.vel.y);
    met.update([h, wire.vel.y, currentOn ? liftForce : 0]);
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // field region
  ctx.fillStyle = '#e3f2fd';
  ctx.fillRect(100, fieldLineY - 20, 400, 40);
  ctx.strokeStyle = '#1976d2'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(100, fieldLineY); ctx.lineTo(500, fieldLineY); ctx.stroke();
  ctx.fillStyle = '#1565c0'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('B field (into page)', 300, fieldLineY - 6);

  drawBody(ctx, wire);
  if (currentOn) {
    drawArrow(ctx,
      { x: wire.pos.x, y: wire.pos.y + 25 },
      { x: wire.pos.x, y: wire.pos.y - 25 },
      '#4caf50');
  }
  ctx.fillStyle = '#333'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(currentOn ? 'Current ON — Lorentz force lifts wire' : 'Current OFF — gravity wins', 8, 20);

  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
