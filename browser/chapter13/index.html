<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 13: Why Feedback Changes Everything</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 13: Why Feedback Changes Everything</h1>
<p class="key">Without feedback an open-loop system drifts; with feedback it corrects. Both receive the same disturbance.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const TARGET = 240;
let kp = 1.0, distStrength = 30;

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Open-loop (no feedback)', 'Closed-loop (feedback)', 285, 200);
const { canvasA, ctxA, canvasB, ctxB } = ab;

let openPlant, closedPlant, pid, t;
function initState() {
  openPlant   = new Body('open',   30, 100, { mass: 1, radius: 12, color: '#ff9800' });
  closedPlant = new Body('closed', 30, 100, { mass: 1, radius: 12, color: '#1976d2' });
  pid = new PID(kp, 0.1, 0.4, TARGET);
  t = 0;
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Kp', 0.2, 4, 0.1, kp, v => { kp = v; pid.kp = v; });
UI.slider(cp, 'Disturbance', 0, 80, 2, distStrength, v => { distStrength = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 110, window: 400,
  colors: ['#ff9800', '#1976d2'], labels: ['open-loop pos', 'closed-loop pos'],
  title: 'Position under same disturbance: open-loop vs closed-loop'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Open pos', 'Closed pos', 'Open err', 'Closed err']);

// disturbance: a periodic sidewind
function disturbance(t) {
  return distStrength * (Math.sin(t * 0.05) > 0.5 ? 1 : 0);
}

function drawPlant(c_ctx, cw, ch, plant, targetX, label, color) {
  c_ctx.clearRect(0, 0, cw, ch);
  c_ctx.strokeStyle = '#ddd'; c_ctx.setLineDash([4, 4]);
  c_ctx.beginPath(); c_ctx.moveTo(targetX, 0); c_ctx.lineTo(targetX, ch); c_ctx.stroke();
  c_ctx.setLineDash([]);
  drawBody(c_ctx, plant);
  c_ctx.fillStyle = '#4caf50'; c_ctx.beginPath(); c_ctx.arc(targetX, ch / 2, 5, 0, Math.PI * 2); c_ctx.fill();
  const err = Math.abs(plant.pos.x - targetX);
  c_ctx.fillStyle = err < 5 ? '#4caf50' : '#e53935';
  c_ctx.fillRect(plant.pos.x, ch / 2 - 4, plant.pos.x < targetX ? err : -err, 3);
  c_ctx.fillStyle = '#333'; c_ctx.font = '11px sans-serif'; c_ctx.textAlign = 'left';
  c_ctx.fillText(label, 4, 16);
  c_ctx.fillText('err=' + (plant.pos.x - targetX).toFixed(1), 4, 30);
}

function draw() {
  if (!state.paused) {
    t++;
    const d = disturbance(t);

    // Open loop: fixed force, no measurement
    openPlant.clearForces();
    openPlant.addForce(new Vec(20, 0));         // fixed command
    openPlant.addForce(new Vec(d, 0));           // unmeasured disturbance
    openPlant.addForce(openPlant.vel.mul(-1));
    openPlant.step(0.016);
    if (openPlant.pos.x > 270) { openPlant.pos.x = 270; openPlant.vel.x = 0; }

    // Closed loop: feedback corrects
    closedPlant.clearForces();
    closedPlant.addForce(new Vec(pid.update(closedPlant.pos.x, 0.016), 0));
    closedPlant.addForce(new Vec(d, 0));         // same disturbance
    closedPlant.addForce(closedPlant.vel.mul(-1));
    closedPlant.step(0.016);
    if (closedPlant.pos.x > 270) { closedPlant.pos.x = 270; closedPlant.vel.x *= -0.5; }
    if (closedPlant.pos.x < 0) { closedPlant.pos.x = 0; closedPlant.vel.x = 0; }

    plot.push(0, openPlant.pos.x);
    plot.push(1, closedPlant.pos.x);
    met.update([openPlant.pos.x, closedPlant.pos.x, openPlant.pos.x - TARGET, closedPlant.pos.x - TARGET]);
  }
  drawPlant(ctxA, canvasA.width, canvasA.height, openPlant, TARGET, 'Open-loop', '#ff9800');
  drawPlant(ctxB, canvasB.width, canvasB.height, closedPlant, TARGET, 'Closed-loop (Kp=' + kp.toFixed(1) + ')', '#1976d2');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
