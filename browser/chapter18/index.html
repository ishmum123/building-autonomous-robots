<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 18: Why Quadcopters Need Two Brains</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 18: Why Quadcopters Need Two Brains</h1>
<p class="key">Attitude (tilt) and altitude (height) are separate but coupled. The fast inner attitude loop must run inside the slower outer position loop.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const HOV_Y = 80;
let kpAtt = 3.0, kpAlt = 5.0;

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Altitude only (no att ctrl)', 'Two-loop (att + alt)', 280, 220);
const { canvasA, ctxA, canvasB, ctxB } = ab;

let qA, qB, altA, altB, attB;
function initState() {
  qA = new Quadcopter(1.0);
  qA.body.pos = new Vec(140, 200); qA.body.angle = 0.3;
  qB = new Quadcopter(1.0);
  qB.body.pos = new Vec(140, 200); qB.body.angle = 0.3;
  altA = new PID(kpAlt, 0.1, 1.0, HOV_Y);
  altB = new PID(kpAlt, 0.1, 1.0, HOV_Y);
  attB = new PID(kpAtt, 0, 0.8, 0);
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Attitude Kp', 0.5, 8, 0.5, kpAtt, v => { kpAtt = v; attB.kp = v; });
UI.slider(cp, 'Altitude Kp', 1, 10, 0.5, kpAlt, v => { kpAlt = v; altA.kp = v; altB.kp = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 120, window: 400,
  colors: ['#ff9800', '#1976d2', '#e53935'],
  labels: ['no att: tilt', 'two-loop: tilt', 'target 0'],
  title: 'Attitude angle over time'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['No-att tilt°', 'Two-loop tilt°', 'Alt err A', 'Alt err B']);

function r2d(r) { return (r * 180 / Math.PI).toFixed(1); }

function stepA(q, altPid) {
  const thrust = -altPid.update(q.body.pos.y, 0.016);
  q.setMotors(thrust, thrust);
  q.body.addForce(new Vec(0, -q.body.mass * 9.81));
  q.step(0.016);
  q.body.pos.x = Math.max(20, Math.min(260, q.body.pos.x));
  q.body.pos.y = Math.max(10, Math.min(210, q.body.pos.y));
}

function stepB(q, altPid, attPid) {
  const baseThrust = -altPid.update(q.body.pos.y, 0.016);
  const torqueCmd  = attPid.update(q.body.angle, 0.016);
  q.setMotors(baseThrust - torqueCmd, baseThrust + torqueCmd);
  q.body.addForce(new Vec(0, -q.body.mass * 9.81));
  q.step(0.016);
  q.body.pos.x = Math.max(20, Math.min(260, q.body.pos.x));
  q.body.pos.y = Math.max(10, Math.min(210, q.body.pos.y));
}

function drawQuad(c, cx, q, label) {
  cx.clearRect(0, 0, c.width, c.height);
  cx.strokeStyle = '#4caf50'; cx.setLineDash([4, 4]);
  cx.beginPath(); cx.moveTo(0, HOV_Y); cx.lineTo(c.width, HOV_Y); cx.stroke();
  cx.setLineDash([]);
  // draw body as rectangle to show tilt
  const bx = q.body.pos.x, by = q.body.pos.y, ang = q.body.angle;
  cx.save();
  cx.translate(bx, by);
  cx.rotate(ang);
  cx.fillStyle = q.body.color;
  cx.fillRect(-20, -6, 40, 12);
  cx.fillStyle = '#fff';
  cx.fillRect(-2, -8, 4, 16);
  cx.restore();
  cx.fillStyle = '#333'; cx.font = '11px sans-serif'; cx.textAlign = 'left';
  cx.fillText(label, 4, 16);
  cx.fillText('tilt=' + r2d(q.body.angle) + '°', 4, 30);
  cx.fillText('alt=' + q.body.pos.y.toFixed(0), 4, 44);
}

function draw() {
  if (!state.paused) {
    stepA(qA, altA);
    stepB(qB, altB, attB);
    plot.push(0, qA.body.angle);
    plot.push(1, qB.body.angle);
    plot.push(2, 0);
    met.update([r2d(qA.body.angle), r2d(qB.body.angle), qA.body.pos.y - HOV_Y, qB.body.pos.y - HOV_Y]);
  }
  drawQuad(canvasA, ctxA, qA, 'Alt loop only');
  drawQuad(canvasB, ctxB, qB, 'Att + Alt loops');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
