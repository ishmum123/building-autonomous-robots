<body>
<h1>Chapter 28: Why Sensors Disagree</h1>
<p class="key">Two sensors measuring the same value give different readings — each has its own noise and bias. Trusting one naively leads to error; the right answer lies between them.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
let noiseA = 6, biasA = 10, noiseB = 20, biasB = -5;

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Sensor A readings', 'Sensor B readings', 280, 200);
const { canvasA, ctxA, canvasB, ctxB } = ab;

let trueVal = 140;
function initState() { trueVal = 140; }
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Noise A', 0, 30, 1, noiseA, v => { noiseA = v; });
UI.slider(cp, 'Bias A', -30, 30, 1, biasA, v => { biasA = v; });
UI.slider(cp, 'Noise B', 0, 40, 1, noiseB, v => { noiseB = v; });
UI.slider(cp, 'Bias B', -30, 30, 1, biasB, v => { biasB = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 120, window: 300,
  colors: ['#1976d2', '#e53935', '#4caf50'],
  labels: ['sensor A', 'sensor B', 'truth'],
  title: 'Sensor A vs B readings — same true value'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Truth', 'Sensor A', 'A err', 'Sensor B', 'B err']);

// Smoothed display values
let sA = trueVal, sB = trueVal;

function drawSensor(c, cx, reading, label, color) {
  cx.clearRect(0, 0, c.width, c.height);
  // horizontal bar showing uncertainty zone
  const scale = 0.9;
  const mid = c.height / 2;
  cx.fillStyle = color + '22';
  cx.fillRect(0, mid - 25, c.width, 50);
  // truth line
  cx.strokeStyle = '#4caf50'; cx.lineWidth = 2; cx.setLineDash([4, 4]);
  cx.beginPath(); cx.moveTo(trueVal * scale, 0); cx.lineTo(trueVal * scale, c.height); cx.stroke();
  cx.setLineDash([]);
  // reading dot
  drawPoint(cx, reading * scale, mid, color, 8);
  // error bracket
  const errPx = (reading - trueVal) * scale;
  cx.strokeStyle = '#e53935'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(trueVal * scale, mid); cx.lineTo(trueVal * scale + errPx, mid); cx.stroke();
  cx.fillStyle = '#333'; cx.font = '11px sans-serif'; cx.textAlign = 'left';
  cx.fillText(label, 4, 16);
  cx.fillText('read=' + reading.toFixed(1) + ' err=' + (reading - trueVal).toFixed(1), 4, 30);
  cx.fillStyle = '#4caf50'; cx.font = '9px sans-serif';
  cx.fillText('truth=' + trueVal.toFixed(0), 4, c.height - 8);
}

function draw() {
  if (!state.paused) {
    sA = addNoise(trueVal + biasA, noiseA);
    sB = addNoise(trueVal + biasB, noiseB);
    plot.push(0, sA);
    plot.push(1, sB);
    plot.push(2, trueVal);
    met.update([trueVal, sA, sA - trueVal, sB, sB - trueVal]);
  }
  drawSensor(canvasA, ctxA, sA, 'Sensor A (bias=' + biasA + ', noise=' + noiseA + ')', '#1976d2');
  drawSensor(canvasB, ctxB, sB, 'Sensor B (bias=' + biasB + ', noise=' + noiseB + ')', '#e53935');
  requestAnimationFrame(draw);
}
draw();
</script>
