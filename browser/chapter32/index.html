<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 32: Why Maps Matter</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 32: Why Maps Matter</h1>
<p class="key">Without a map the robot re-explores everywhere. With a map it routes directly to the goal.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const CELL = 36, COLS = 10, ROWS = 7, OX = 10, OY = 20;
let obstDensity = 3;
let gridA, gridB, pathB, stepB, rwX, rwY, rwSteps, t;

function buildGrids() {
  gridA = new Grid(COLS, ROWS);
  gridB = new Grid(COLS, ROWS);
  for (let y = 0; y < ROWS - 1; y++) { gridA.block(4, y); gridB.block(4, y); }
  for (let i = 0; i < obstDensity; i++) {
    const x = 1 + (i * 3) % (COLS - 2);
    const y = (i * 2) % ROWS;
    if (!(x === 0 && y === 0) && !(x === COLS-1 && y === ROWS-1)) {
      gridA.block(x, y); gridB.block(x, y);
    }
  }
}

function initState() {
  t = 0; rwX = 0; rwY = 0; rwSteps = 0; stepB = 0;
  buildGrids();
  pathB = astar(gridB, [0, 0], [COLS - 1, ROWS - 1]);
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Extra obstacles', 0, 8, 1, obstDensity, v => { obstDensity = v; });
const { state } = UI.pauseResetBar(cp, initState);

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['No-map steps', 'Map steps', 'Map path len']);

const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'No map (random walk)', 'Map + A* path', 370, 275);
const { canvasA, ctxA, canvasB, ctxB } = ab;

function drawScene(cx, grid, W, H) {
  cx.clearRect(0, 0, W, H);
  drawGrid(cx, grid, { cell: CELL, ox: OX, oy: OY });
  drawPoint(cx, OX + (COLS-1)*CELL + CELL/2, OY + (ROWS-1)*CELL + CELL/2, '#ff9800', 7);
}

function draw() {
  if (!state.paused) {
    t++;
    rwSteps++;
    const [dx, dy] = dirs[Math.floor(Math.random() * 4)];
    const nx = Math.max(0, Math.min(COLS-1, rwX + dx));
    const ny = Math.max(0, Math.min(ROWS-1, rwY + dy));
    if (!gridA.isBlocked(nx, ny)) { rwX = nx; rwY = ny; }
    if (rwX === COLS-1 && rwY === ROWS-1) { rwX = 0; rwY = 0; }
    if (pathB && stepB < pathB.length - 1 && t % 4 === 0) stepB++;
    met.update([rwSteps, stepB, pathB ? pathB.length : '—']);
  }

  drawScene(ctxA, gridA, canvasA.width, canvasA.height);
  drawPoint(ctxA, OX + rwX*CELL + CELL/2, OY + rwY*CELL + CELL/2, '#1976d2', 7);
  ctxA.fillStyle = '#333'; ctxA.font = '10px sans-serif'; ctxA.textAlign = 'left';
  ctxA.fillText('steps: ' + rwSteps, 4, 14);

  drawScene(ctxB, gridB, canvasB.width, canvasB.height);
  if (pathB) drawGridPath(ctxB, pathB, { cell: CELL, ox: OX, oy: OY });
  if (pathB && stepB < pathB.length) {
    const [px, py] = pathB[stepB];
    drawPoint(ctxB, OX + px*CELL + CELL/2, OY + py*CELL + CELL/2, '#1976d2', 7);
  }
  ctxB.fillStyle = '#333'; ctxB.font = '10px sans-serif'; ctxB.textAlign = 'left';
  ctxB.fillText('step ' + stepB + ' / ' + (pathB ? pathB.length : '?'), 4, 14);

  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
