<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 33: Why Hovering Is Hard</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 33: Why Hovering Is Hard</h1>
<p class="key">Without a controller, constant thrust cannot cancel gravity perfectly — the drone sinks or climbs. A PID altitude controller continuously adjusts thrust to hover.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const TARGET_Y = 100;
let kpAlt = 4.0, kiAlt = 0.2, fixedThrust = 9.0;

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'No controller (sinks/climbs)', 'PID hover controller', 280, 220);
const { canvasA, ctxA, canvasB, ctxB } = ab;

let qA, qB, pidB;
function initState() {
  qA = new Quadcopter(1.0);
  qA.body.pos = new Vec(140, 180); qA.body.angle = 0;
  qB = new Quadcopter(1.0);
  qB.body.pos = new Vec(140, 180); qB.body.angle = 0;
  pidB = new PID(kpAlt, kiAlt, 1.0, TARGET_Y);
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Fixed thrust', 7, 13, 0.2, fixedThrust, v => { fixedThrust = v; });
UI.slider(cp, 'Alt Kp', 1, 10, 0.5, kpAlt, v => { kpAlt = v; pidB.kp = v; });
UI.slider(cp, 'Alt Ki', 0, 1, 0.05, kiAlt, v => { kiAlt = v; pidB.ki = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 120, window: 400,
  colors: ['#ff9800', '#1976d2', '#4caf50'],
  labels: ['no-ctrl alt', 'PID alt', 'target'],
  title: 'Altitude over time: no controller vs PID hover'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['No-ctrl alt', 'PID alt', 'PID err', 'PID thrust']);

const G = 9.81;

function drawQuad(c, cx, q, label, thrust) {
  cx.clearRect(0, 0, c.width, c.height);
  cx.strokeStyle = '#4caf50'; cx.lineWidth = 2; cx.setLineDash([5, 5]);
  cx.beginPath(); cx.moveTo(0, TARGET_Y); cx.lineTo(c.width, TARGET_Y); cx.stroke();
  cx.setLineDash([]);
  const bx = q.body.pos.x;
  const by = Math.max(15, Math.min(205, q.body.pos.y));
  cx.save();
  cx.translate(bx, by);
  cx.fillStyle = q.body.color;
  cx.fillRect(-22, -5, 44, 10);
  drawArrow(cx, { x: -18, y: 0 }, { x: -18, y: -thrust * 2.5 }, '#4caf50');
  drawArrow(cx, { x: 18, y: 0 }, { x: 18, y: -thrust * 2.5 }, '#4caf50');
  cx.restore();
  cx.fillStyle = '#333'; cx.font = '11px sans-serif'; cx.textAlign = 'left';
  cx.fillText(label, 4, 16);
  cx.fillText('alt=' + by.toFixed(0) + ' err=' + (by - TARGET_Y).toFixed(1), 4, 30);
}

function draw() {
  if (!state.paused) {
    // no controller: fixed thrust, gravity wins
    qA.body.clearForces();
    qA.body.addForce(new Vec(0, -qA.body.mass * G));
    qA.setMotors(fixedThrust / 2, fixedThrust / 2);
    qA.step(0.016);
    qA.body.pos.y = Math.max(15, Math.min(205, qA.body.pos.y));

    // PID hover
    const thrustCmd = -pidB.update(qB.body.pos.y, 0.016);
    qB.body.clearForces();
    qB.body.addForce(new Vec(0, -qB.body.mass * G));
    qB.setMotors(thrustCmd / 2, thrustCmd / 2);
    qB.step(0.016);
    qB.body.pos.y = Math.max(15, Math.min(205, qB.body.pos.y));

    plot.push(0, qA.body.pos.y);
    plot.push(1, qB.body.pos.y);
    plot.push(2, TARGET_Y);
    met.update([qA.body.pos.y, qB.body.pos.y, qB.body.pos.y - TARGET_Y, thrustCmd.toFixed(1)]);
  }
  drawQuad(canvasA, ctxA, qA, 'Fixed thrust=' + fixedThrust.toFixed(1), fixedThrust / 2);
  drawQuad(canvasB, ctxB, qB, 'PID Kp=' + kpAlt.toFixed(1), Math.max(0, -pidB.kp * (qB.body.pos.y - TARGET_Y)) / 2);
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
