<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 41: Why Obstacles Change Everything</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 41: Why Obstacles Change Everything</h1>
<p class="key">Ignoring obstacles leads to collision. Obstacle-aware planning finds the safe path.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const W = 280, H = 240, GX = 250, GY = 120;
const OBS = [{ x: 130, y: 70, r: 30 }, { x: 140, y: 160, r: 25 }];
let avoidKp = 5.0;
let rA, rB, pidBx, pidBy, t, crashedA;

function initState() {
  t = 0; crashedA = false;
  rA = new Body('ignore', 20, 120, { mass: 1, radius: 8, color: '#e53935' });
  rB = new Body('avoid', 20, 120, { mass: 1, radius: 8, color: '#1976d2' });
  pidBx = new PID(avoidKp, 0, 0.6, GX);
  pidBy = new PID(avoidKp, 0, 0.6, GY);
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Avoid Kp', 1, 10, 0.5, avoidKp, v => { avoidKp = v; });
const { state } = UI.pauseResetBar(cp, initState);

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Frame', 'Ignore dist-to-goal', 'Avoid dist-to-goal', 'Crashed?']);

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Ignores obstacles', 'Avoids obstacles', W, H);
const { canvasA, ctxA, canvasB, ctxB } = ab;

function collides(body) {
  for (const o of OBS) {
    if (Math.hypot(body.pos.x - o.x, body.pos.y - o.y) < o.r + body.radius) return true;
  }
  return false;
}

function repulsionForce(body) {
  let fx = 0, fy = 0;
  for (const o of OBS) {
    const dx = body.pos.x - o.x, dy = body.pos.y - o.y;
    const dist = Math.hypot(dx, dy);
    const safe = o.r + body.radius + 20;
    if (dist < safe && dist > 0) {
      const mag = (safe - dist) / safe * 15;
      fx += (dx / dist) * mag;
      fy += (dy / dist) * mag;
    }
  }
  return new Vec(fx, fy);
}

function drawSide(cx, cv, body, label) {
  cx.clearRect(0, 0, cv.width, cv.height);
  for (const o of OBS) {
    cx.fillStyle = 'rgba(200,50,50,0.25)'; cx.beginPath();
    cx.arc(o.x, o.y, o.r, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = '#c62828'; cx.lineWidth = 2; cx.stroke();
  }
  drawPoint(cx, GX, GY, '#ff9800', 10);
  cx.fillStyle = '#ff9800'; cx.font = '10px sans-serif'; cx.textAlign = 'center';
  cx.fillText('GOAL', GX, GY - 14);
  if (!crashedA || body !== rA) drawBody(cx, body, { radius: 8 });
  if (crashedA && body === rA) {
    cx.fillStyle = '#e53935'; cx.font = 'bold 12px sans-serif'; cx.textAlign = 'center';
    cx.fillText('CRASHED', body.pos.x, body.pos.y - 14);
    drawPoint(cx, body.pos.x, body.pos.y, '#e53935', 8);
  }
  const dist = Math.hypot(body.pos.x - GX, body.pos.y - GY);
  cx.fillStyle = '#333'; cx.font = '10px sans-serif'; cx.textAlign = 'left';
  cx.fillText(label, 4, 14);
  cx.fillText('dist=' + dist.toFixed(1), 4, 27);
}

const DRAG = 1.2;

function draw() {
  if (!state.paused) {
    t++;
    if (!crashedA) {
      // ignore: straight PID, no obstacle avoidance
      rA.clearForces();
      rA.addForce(new Vec(-new PID(avoidKp, 0, 0.6, GX).update(rA.pos.x, 0.016),
                          -new PID(avoidKp, 0, 0.6, GY).update(rA.pos.y, 0.016)));
      rA.addForce(rA.vel.mul(-DRAG));
      rA.step(0.016);
      if (collides(rA)) crashedA = true;
    }

    // avoid: PID + repulsion
    rB.clearForces();
    const rep = repulsionForce(rB);
    rB.addForce(new Vec(-pidBx.update(rB.pos.x, 0.016) + rep.x,
                        -pidBy.update(rB.pos.y, 0.016) + rep.y));
    rB.addForce(rB.vel.mul(-DRAG));
    rB.step(0.016);
    rB.pos.x = Math.max(8, Math.min(W-8, rB.pos.x));
    rB.pos.y = Math.max(8, Math.min(H-8, rB.pos.y));

    const dA = Math.hypot(rA.pos.x - GX, rA.pos.y - GY);
    const dB = Math.hypot(rB.pos.x - GX, rB.pos.y - GY);
    met.update([t, dA.toFixed(1), dB.toFixed(1), crashedA ? 'YES' : 'no']);
  }
  drawSide(ctxA, canvasA, rA, crashedA ? 'CRASHED into obstacle' : 'Heading to goal');
  drawSide(ctxB, canvasB, rB, 'Avoiding obstacles');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
