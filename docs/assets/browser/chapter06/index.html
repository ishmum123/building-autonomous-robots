<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 06: Why Motors Spin</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 640px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  canvas { border: 1px solid #ccc; background: #fafafa; display: block; margin: 0 auto; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 06: Why Motors Spin</h1>
<p class="key">A motor switches current at the right moment to keep rotating — commutation converts alternating push into continuous spin.</p>
<div id="controls"></div>
<canvas id="sim" width="600" height="240"></canvas>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

let pushStrength = 40, commutePeriod = 50;
let angVel, angle, t;

function initState() {
  angVel = 0; angle = 0; t = 0;
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Push torque', 5, 120, 5, pushStrength, v => { pushStrength = v; });
UI.slider(cp, 'Switch period (frames)', 10, 150, 5, commutePeriod, v => { commutePeriod = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 600, height: 100, window: 400,
  colors: ['#1976d2', '#ff9800'], labels: ['angular vel', 'commutation'],
  title: 'Angular velocity & Commutation phase'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Angle (rad)', 'Angular vel', 'Phase']);

function draw() {
  if (!state.paused) {
    t++;
    const phase = Math.floor(t / commutePeriod) % 2;
    const torque = phase === 0 ? pushStrength : -pushStrength;
    const drag = -0.5 * angVel;
    angVel += (torque + drag) * 0.016;
    angle += angVel * 0.016;

    plot.push(0, angVel);
    plot.push(1, phase === 0 ? 1 : -1);
    met.update([angle.toFixed(2), angVel, phase === 0 ? 1 : -1]);
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = 300, cy = 120, R = 55;
  // stator ring
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, R + 8, 0, Math.PI * 2); ctx.stroke();
  // rotor
  ctx.fillStyle = '#1976d2';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
  // rotor arm
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + (R - 4) * Math.cos(angle), cy + (R - 4) * Math.sin(angle));
  ctx.stroke();

  // phase arrows
  const phase = Math.floor(t / commutePeriod) % 2;
  const arrowColor = phase === 0 ? '#4caf50' : '#e53935';
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2;
    const ox = cx + Math.cos(a) * (R + 8);
    const oy = cy + Math.sin(a) * (R + 8);
    const dir = phase === 0 ? 1 : -1;
    const tx = ox + Math.cos(a + Math.PI / 2) * dir * 12;
    const ty = oy + Math.sin(a + Math.PI / 2) * dir * 12;
    drawArrow(ctx, { x: ox, y: oy }, { x: tx, y: ty }, arrowColor);
  }

  ctx.fillStyle = '#333'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('Phase: ' + (phase === 0 ? 'A' : 'B') + '   Commutation keeps rotation continuous', 8, 20);

  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
