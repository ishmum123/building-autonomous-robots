<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 11: Why Faster Isn't Better</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 680px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 11: Why Faster Isn't Better</h1>
<p class="key">Aggressive proportional gain causes overshoot and oscillation — there is a trade-off between speed and stability.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
const TARGET_X = 240;
let kpLow = 1.5, kpHigh = 8.0;

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Low gain (stable)', 'High gain (overshoots)', 285, 200);
const { canvasA, ctxA, canvasB, ctxB } = ab;

let plantA, pidA, plantB, pidB;
function initState() {
  plantA = new Body('A', 30, 100, { mass: 1, radius: 12, color: '#4caf50' });
  pidA   = new PID(kpLow, 0, 0, TARGET_X);
  plantB = new Body('B', 30, 100, { mass: 1, radius: 12, color: '#e53935' });
  pidB   = new PID(kpHigh, 0, 0, TARGET_X);
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Low Kp', 0.5, 4, 0.1, kpLow, v => { kpLow = v; pidA.kp = v; });
UI.slider(cp, 'High Kp', 4, 20, 0.5, kpHigh, v => { kpHigh = v; pidB.kp = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 110, window: 400,
  colors: ['#4caf50', '#e53935'], labels: ['low Kp position', 'high Kp position'],
  title: 'Position over time: low vs high proportional gain'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Low-gain pos', 'High-gain pos', 'Low-gain err', 'High-gain err']);

function drawPlant(c_ctx, cw, ch, plant, target_x, color, label) {
  c_ctx.clearRect(0, 0, cw, ch);
  c_ctx.fillStyle = '#e8f5e9'; c_ctx.fillRect(0, 0, cw, ch);
  // target line
  c_ctx.strokeStyle = '#aaa'; c_ctx.lineWidth = 1; c_ctx.setLineDash([4, 4]);
  c_ctx.beginPath(); c_ctx.moveTo(target_x, 0); c_ctx.lineTo(target_x, ch); c_ctx.stroke();
  c_ctx.setLineDash([]);
  drawBody(c_ctx, plant);
  // error bar
  const err = target_x - plant.pos.x;
  c_ctx.fillStyle = Math.abs(err) < 5 ? '#4caf50' : color;
  c_ctx.fillRect(plant.pos.x, plant.pos.y - 6, err, 3);
  c_ctx.fillStyle = '#333'; c_ctx.font = '11px sans-serif'; c_ctx.textAlign = 'left';
  c_ctx.fillText(label + ' Kp=' + (color === '#4caf50' ? kpLow.toFixed(1) : kpHigh.toFixed(1)), 4, 16);
  c_ctx.fillText('pos=' + plant.pos.x.toFixed(0), 4, 30);
}

function draw() {
  if (!state.paused) {
    plantA.clearForces();
    plantA.addForce(new Vec(pidA.update(plantA.pos.x, 0.016), 0));
    plantA.addForce(plantA.vel.mul(-0.5));
    plantA.step(0.016);

    plantB.clearForces();
    plantB.addForce(new Vec(pidB.update(plantB.pos.x, 0.016), 0));
    plantB.addForce(plantB.vel.mul(-0.5));
    plantB.step(0.016);

    plot.push(0, plantA.pos.x);
    plot.push(1, plantB.pos.x);
    met.update([plantA.pos.x, plantB.pos.x, TARGET_X - plantA.pos.x, TARGET_X - plantB.pos.x]);
  }
  drawPlant(ctxA, canvasA.width, canvasA.height, plantA, TARGET_X, '#4caf50', 'Low');
  drawPlant(ctxB, canvasB.width, canvasB.height, plantB, TARGET_X, '#e53935', 'High');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
