<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 20: Why Errors Accumulate</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 20: Why Errors Accumulate</h1>
<p class="key">Tiny velocity bias integrates into large position error. Correction requires measuring truth — not trusting the estimate.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
let velBias = 0.02, correctionGain = 0.1;

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'No correction (drift)', 'With correction', 285, 210);
const { canvasA, ctxA, canvasB, ctxB } = ab;

let trueX, estXNone, estXCorr, t;
function initState() {
  trueX = 50; estXNone = 50; estXCorr = 50; t = 0;
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Velocity bias', 0, 0.1, 0.002, velBias, v => { velBias = v; });
UI.slider(cp, 'Correction gain', 0, 0.5, 0.01, correctionGain, v => { correctionGain = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 120, window: 500,
  colors: ['#4caf50', '#e53935', '#1976d2'],
  labels: ['truth', 'no-correct est', 'corrected est'],
  title: 'Position over time: accumulation vs correction'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['True pos', 'No-corr err', 'Corrected err', 'Bias']);

const trueVel = 1.0;
const estVel  = 1.0 + 0; // matches true; only the biased integrator drifts

function drawTrack(c_ctx, cw, ch, trueX, estX, color, label) {
  c_ctx.clearRect(0, 0, cw, ch);
  // track
  c_ctx.fillStyle = '#e0e0e0'; c_ctx.fillRect(0, 80, cw, 40);
  // truth dot
  drawPoint(c_ctx, trueX % cw, 100, '#4caf50', 8);
  // estimate dot
  drawPoint(c_ctx, estX % cw, 100, color, 6);
  // error marker
  const err = Math.abs(estX - trueX);
  c_ctx.fillStyle = err < 5 ? '#4caf50' : '#e53935';
  c_ctx.fillRect(Math.min(trueX, estX) % cw, 95, Math.min(err, cw), 3);
  c_ctx.fillStyle = '#333'; c_ctx.font = '11px sans-serif'; c_ctx.textAlign = 'left';
  c_ctx.fillText(label, 4, 18);
  c_ctx.fillText('err=' + err.toFixed(1) + 'px', 4, 32);
  c_ctx.fillStyle = '#4caf50'; c_ctx.font = '9px sans-serif';
  c_ctx.fillText('truth', 4, 145);
  c_ctx.fillStyle = color;
  c_ctx.fillText('estimate', 4, 157);
}

function draw() {
  if (!state.paused) {
    t++;
    trueX   += trueVel * 0.016 * 10;
    estXNone += (trueVel + velBias) * 0.016 * 10; // biased, uncorrected
    // corrected: nudge estimate toward truth periodically (GPS-like measurement every 60 frames)
    estXCorr += (trueVel + velBias) * 0.016 * 10;
    if (t % 60 === 0) {
      // correction: proportional nudge toward truth
      estXCorr += correctionGain * (trueX - estXCorr);
    }
    // wrap
    if (trueX > 600) { trueX = 50; estXNone = 50; estXCorr = 50; }

    plot.push(0, trueX);
    plot.push(1, estXNone);
    plot.push(2, estXCorr);
    met.update([trueX, estXNone - trueX, estXCorr - trueX, velBias]);
  }
  drawTrack(ctxA, canvasA.width, canvasA.height, trueX, estXNone, '#e53935', 'No correction');
  drawTrack(ctxB, canvasB.width, canvasB.height, trueX, estXCorr, '#1976d2', 'With correction (gain=' + correctionGain.toFixed(2) + ')');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
