<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 38: Why Dead Reckoning Fails</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 38: Why Dead Reckoning Fails</h1>
<p class="key">Integrating noisy velocity accumulates unbounded error. GPS corrections reset it.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
let velNoise = 0.08, trueVel = 1.2;
let trueX, drX, gpsX, gpsTimer, t;

function initState() {
  t = 0; trueX = 20; drX = 20; gpsX = 20; gpsTimer = 0;
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Vel noise σ', 0.01, 0.3, 0.01, velNoise, v => { velNoise = v; });
UI.slider(cp, 'True vel', 0.5, 3, 0.1, trueVel, v => { trueVel = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Dead reckoning (no GPS)', 'GPS-corrected estimate', 280, 200);
const { canvasA, ctxA, canvasB, ctxB } = ab;

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 110, window: 300,
  colors: ['#e53935', '#1976d2', '#4caf50'],
  labels: ['DR error', 'GPS error', 'zero'],
  title: 'Position error over time'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['True X', 'DR X', 'GPS X', 'DR error']);

const GPS_RATE = 60;

function drawTrack(cv, cx, pos, color, label) {
  cx.clearRect(0, 0, cv.width, cv.height);
  cx.fillStyle = '#e8e8e8'; cx.fillRect(0, 80, cv.width, 40);
  const tx = Math.min(trueX % cv.width, cv.width - 5);
  const px = Math.min(pos % cv.width, cv.width - 5);
  drawPoint(cx, tx, 100, '#4caf50', 7);
  drawPoint(cx, px, 100, color, 5);
  const err = pos - trueX;
  cx.fillStyle = '#333'; cx.font = '10px sans-serif'; cx.textAlign = 'left';
  cx.fillText(label, 4, 15);
  cx.fillText('err=' + err.toFixed(1), 4, 28);
}

function draw() {
  if (!state.paused) {
    t++;
    const noisyVel = addNoise(trueVel, velNoise);
    trueX += trueVel;
    drX += noisyVel;
    gpsX += noisyVel;
    gpsTimer++;
    if (gpsTimer >= GPS_RATE) {
      gpsX = addNoise(trueX, 1.5);
      gpsTimer = 0;
    }
    if (trueX > 1200) { trueX = 20; drX = 20; gpsX = 20; }

    plot.push(0, drX - trueX);
    plot.push(1, gpsX - trueX);
    plot.push(2, 0);
    met.update([trueX.toFixed(1), drX.toFixed(1), gpsX.toFixed(1), (drX - trueX).toFixed(2)]);
  }
  drawTrack(canvasA, ctxA, drX, '#e53935', 'Dead reckoning (red)');
  drawTrack(canvasB, ctxB, gpsX, '#1976d2', 'GPS-corrected (blue)');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
