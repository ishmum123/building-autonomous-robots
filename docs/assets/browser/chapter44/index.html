<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 44: Why Decisions Need Models</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 44: Why Decisions Need Models</h1>
<p class="key">Reactive robot acts on current sensor; model-based robot predicts outcome and picks the best action.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
// Drone landing: target alt = 0. Reactive: apply max brake when close.
// Model-based: plan a smooth descent trajectory.
const TARGET_Y = 220, START_Y = 20;
let reactThresh = 60, modelHorizon = 4;
let qA, qB, altPidA, altPidB, t;

function initState() {
  t = 0;
  qA = new Quadcopter(1.0);
  qA.body.pos = new Vec(70, START_Y);
  qB = new Quadcopter(1.0);
  qB.body.pos = new Vec(70, START_Y);
  altPidA = new PID(2.0, 0.02, 0.5, TARGET_Y);
  altPidB = new PID(4.0, 0.05, 1.2, TARGET_Y);
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'React threshold', 20, 120, 10, reactThresh, v => { reactThresh = v; });
UI.slider(cp, 'Model horizon', 1, 8, 1, modelHorizon, v => { modelHorizon = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Reactive (bang-bang)', 'Model-based (smooth PID)', 280, 250);
const { canvasA, ctxA, canvasB, ctxB } = ab;

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 100, window: 300,
  colors: ['#e53935', '#1976d2'],
  labels: ['reactive vel', 'model-based vel'],
  title: 'Descent velocity (reactive bounces, model-based settles)'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Frame', 'Reactive alt', 'Model alt', 'Reactive vel', 'Model vel']);

const G = 9.81;

function stepDrone(q, pid, reactive) {
  const alt = q.body.pos.y;
  const distToGnd = TARGET_Y - alt;
  let thrust;
  if (reactive) {
    // bang-bang: full brake when within threshold, else free fall
    thrust = distToGnd < reactThresh ? q.body.mass * G * 1.8 : q.body.mass * G * 0.4;
  } else {
    thrust = -pid.update(alt, 0.016) + q.body.mass * G;
  }
  q.setMotors(thrust / 2, thrust / 2);
  q.body.addForce(new Vec(0, q.body.mass * G));
  q.step(0.016);
  q.body.pos.y = Math.min(TARGET_Y, Math.max(5, q.body.pos.y));
  if (q.body.pos.y >= TARGET_Y) { q.body.vel.y = Math.min(0, q.body.vel.y); }
}

function drawDrone(cx, cv, q, label) {
  cx.clearRect(0, 0, cv.width, cv.height);
  cx.fillStyle = '#ccc'; cx.fillRect(0, TARGET_Y, cv.width, cv.height - TARGET_Y);
  cx.fillStyle = '#333'; cx.font = '10px sans-serif'; cx.textAlign = 'center';
  cx.fillText('GROUND', cv.width/2, TARGET_Y + 14);
  cx.save(); cx.translate(q.body.pos.x, q.body.pos.y); cx.rotate(q.body.angle);
  cx.fillStyle = q.body.color; cx.fillRect(-22, -5, 44, 10);
  cx.restore();
  cx.fillStyle = '#333'; cx.textAlign = 'left';
  cx.fillText(label, 4, 14);
  cx.fillText('alt=' + (TARGET_Y - q.body.pos.y).toFixed(1) + ' vel=' + q.body.vel.y.toFixed(2), 4, 27);
}

function draw() {
  if (!state.paused) {
    t++;
    stepDrone(qA, altPidA, true);
    stepDrone(qB, altPidB, false);
    plot.push(0, qA.body.vel.y);
    plot.push(1, qB.body.vel.y);
    met.update([t, (TARGET_Y - qA.body.pos.y).toFixed(1), (TARGET_Y - qB.body.pos.y).toFixed(1),
      qA.body.vel.y.toFixed(2), qB.body.vel.y.toFixed(2)]);
  }
  drawDrone(ctxA, canvasA, qA, 'Reactive (bang-bang)');
  drawDrone(ctxB, canvasB, qB, 'Model-based (smooth)');
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
