<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 47: Why State Matters</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; padding: 1rem; background: #fff; }
  h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
  .key { color: #555; max-width: 700px; margin: 0 auto 0.5rem auto; font-size: 0.95rem; }
  .home { margin-top: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>Chapter 47: Why State Matters</h1>
<p class="key">Same voltage reading means different things at full vs low battery. Stateless robot makes wrong decisions.</p>
<div id="controls"></div>
<div id="ab-wrap"></div>
<div id="plot-wrap"></div>
<div id="metrics-wrap"></div>
<script src="../common/engine.js"></script>
<script src="../common/ui.js"></script>
<script>
// Simulate a robot with battery state that drains over time
let drainRate = 0.002, noiseStd = 0.05;
let battery, t, statelesWrong, stateawareWrong;

function initState() {
  t = 0; battery = 1.0; statelesWrong = 0; stateawareWrong = 0;
}
initState();

const ctrl = document.getElementById('controls');
const cp = UI.panel(ctrl);
UI.slider(cp, 'Drain rate', 0.0005, 0.005, 0.0005, drainRate, v => { drainRate = v; });
UI.slider(cp, 'Sensor noise', 0, 0.15, 0.01, noiseStd, v => { noiseStd = v; });
const { state } = UI.pauseResetBar(cp, () => { initState(); plot.clear(); });

const ab = UI.sideBySide(document.getElementById('ab-wrap'), 'Stateless (uses raw volt)', 'State-aware (tracks battery)', 280, 200);
const { canvasA, ctxA, canvasB, ctxB } = ab;

const plot = UI.stripPlot(document.getElementById('plot-wrap'), {
  width: 580, height: 110, window: 400,
  colors: ['#4caf50', '#e53935', '#1976d2'],
  labels: ['true battery', 'stateless reading', 'state estimate'],
  title: 'Battery level: truth vs raw vs tracked estimate'
});

const met = UI.metrics(document.getElementById('metrics-wrap'),
  ['Frame', 'True battery', 'Stateless err', 'State-aware err', 'Stateless wrong', 'State-aware wrong']);

// State-aware uses Kalman
const kf = new Kalman1D(0.0001, 0.03);

function drawBattery(cx, cv, level, rawLevel, label, color) {
  cx.clearRect(0, 0, cv.width, cv.height);
  const bw = 120, bh = 40, bx = (cv.width - bw) / 2, by = 60;
  cx.strokeStyle = '#555'; cx.lineWidth = 2;
  cx.strokeRect(bx, by, bw, bh);
  cx.fillRect(bx + bw, by + 10, 6, 20);
  // fill
  cx.fillStyle = level > 0.4 ? '#4caf50' : level > 0.2 ? '#ff9800' : '#e53935';
  cx.fillRect(bx + 2, by + 2, (bw - 4) * Math.max(0, level), bh - 4);
  // raw reading line
  cx.strokeStyle = color; cx.lineWidth = 2; cx.setLineDash([4, 4]);
  const rx = bx + 2 + (bw - 4) * Math.max(0, rawLevel);
  cx.beginPath(); cx.moveTo(rx, by - 8); cx.lineTo(rx, by + bh + 8); cx.stroke();
  cx.setLineDash([]);
  cx.fillStyle = '#333'; cx.font = '10px sans-serif'; cx.textAlign = 'left';
  cx.fillText(label, 4, 16);
  cx.fillText('true=' + level.toFixed(3) + ' reading=' + rawLevel.toFixed(3), 4, 30);
  // decision indicator
  const THRESH = 0.3;
  const trueAction = level < THRESH ? 'RTB' : 'FLY';
  const readAction = rawLevel < THRESH ? 'RTB' : 'FLY';
  const wrong = trueAction !== readAction;
  cx.fillStyle = wrong ? '#e53935' : '#4caf50';
  cx.font = 'bold 14px sans-serif'; cx.textAlign = 'center';
  cx.fillText('Decision: ' + readAction + (wrong ? ' ← WRONG' : ' ✓'), cv.width/2, by + bh + 28);
}

function draw() {
  if (!state.paused) {
    t++;
    battery = Math.max(0, battery - drainRate);
    const rawVolt = addNoise(battery, noiseStd);
    kf.predict(1, -drainRate);
    kf.update(rawVolt);
    const estBatt = Math.max(0, Math.min(1, kf.x));

    const THRESH = 0.3;
    const trueAct = battery < THRESH ? 'RTB' : 'FLY';
    if ((rawVolt < THRESH ? 'RTB' : 'FLY') !== trueAct) statelesWrong++;
    if ((estBatt < THRESH ? 'RTB' : 'FLY') !== trueAct) stateawareWrong++;

    plot.push(0, battery);
    plot.push(1, rawVolt);
    plot.push(2, estBatt);
    met.update([t, battery.toFixed(3),
      Math.abs(rawVolt - battery).toFixed(3),
      Math.abs(estBatt - battery).toFixed(3),
      statelesWrong, stateawareWrong]);

    drawBattery(ctxA, canvasA, battery, rawVolt, 'Stateless: acts on raw voltage', '#e53935');
    drawBattery(ctxB, canvasB, battery, estBatt, 'State-aware: tracked estimate', '#1976d2');
  } else {
    const rawVolt = addNoise(battery, noiseStd);
    const estBatt = Math.max(0, Math.min(1, kf.x));
    drawBattery(ctxA, canvasA, battery, rawVolt, 'Stateless: acts on raw voltage', '#e53935');
    drawBattery(ctxB, canvasB, battery, estBatt, 'State-aware: tracked estimate', '#1976d2');
  }
  requestAnimationFrame(draw);
}
draw();
</script>
<p class="home"><a href="../../index.html">← Home</a></p>
</body>
</html>
